# Terraform CI/CD for the Fabric CI/CD lab.
#
# Runs in Azure DevOps and authenticates to Azure (state backend storage account,
# ARM/azapi, Entra ID and Microsoft Fabric) with a single Entra ID service
# principal. Every value the Terraform configuration needs - backend storage
# config and all root-module input variables - is supplied from this pipeline.
#
# Secrets MUST live in a variable group (mark client_secret as secret); they are
# NOT committed here. Create a variable group named `fabric-terraform` (or change
# the name below) containing at least:
#   tenantId, subscriptionId, clientId, clientSecret, enterpriseObjectId
# Non-secret values can live in the same group or as the inline defaults below.
#
# Each terraform step is rendered via pipelines/templates/terraform-step.yml so
# the ARM_* / TF_VAR_* env block is defined exactly once.

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  # ---- Secrets + auth (service principal). Define these in the variable group. ----
  - group: fabric-terraform

  # ---- Pipeline / tooling config ----
  - name: terraformVersion
    value: '1.15.6'
  - name: terraformWorkingDirectory
    value: '$(System.DefaultWorkingDirectory)'
  - name: environmentName
    value: 'fabric'

  # ---- Terraform state backend (Azure Storage) ----
  - name: backendResourceGroup
    value: 'fabriccicdlab'
  - name: backendStorageAccount
    value: 'becolemandataplatform'
  - name: backendContainer
    value: 'tfstate'
  - name: backendKey
    value: 'prod.terraform.tfstate'

  # ---- Terraform root-module input variables (non-secret). ----
  # Lists must be JSON so they bind to Terraform list(string) variables.
  - name: resource_group_name
    value: 'fabriccicdlab'
  - name: capacity_name
    value: 'fabriccicdlab'
  - name: location
    value: 'westus3'
  - name: fabric_tier
    value: 'F2'
  - name: workspace_name_prefix
    value: 'Fabric_CICD_Lab'
  - name: administrators
    value: '["becoleman@MngEnvMCAP622220.onmicrosoft.com"]'
  - name: workspace_admins
    value: '["becoleman@MngEnvMCAP622220.onmicrosoft.com"]'

stages:
  - stage: Validate
    displayName: 'Validate Terraform'
    jobs:
      - job: Validate
        displayName: 'Run terraform fmt and validate'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: '$(terraformVersion)'

          - template: pipelines/templates/terraform-step.yml
            parameters:
              displayName: 'Terraform fmt and validate'
              script: |
                terraform fmt -check -recursive
                terraform validate

  - stage: Plan
    displayName: 'Plan Terraform'
    dependsOn: Validate
    jobs:
      - job: Plan
        displayName: 'Create Terraform plan'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: '$(terraformVersion)'

          - template: pipelines/templates/terraform-step.yml
            parameters:
              displayName: 'Terraform plan'
              script: |
                terraform plan -input=false -lock-timeout=300s -out=tfplan
                terraform show -no-color tfplan > tfplan.txt

                mkdir -p "$(Build.ArtifactStagingDirectory)/terraform-plan"
                cp tfplan "$(Build.ArtifactStagingDirectory)/terraform-plan/tfplan"
                cp tfplan.txt "$(Build.ArtifactStagingDirectory)/terraform-plan/tfplan.txt"

          - publish: '$(Build.ArtifactStagingDirectory)/terraform-plan'
            artifact: 'terraform-plan'
            displayName: 'Publish Terraform plan artifact'

  - stage: Apply
    displayName: 'Apply Terraform'
    dependsOn: Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Apply
        displayName: 'Apply Terraform to production'
        environment: '$(environmentName)'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Terraform plan artifact'
                  inputs:
                    buildType: 'current'
                    artifactName: 'terraform-plan'
                    targetPath: '$(Pipeline.Workspace)/terraform-plan'

                - task: TerraformInstaller@1
                  displayName: 'Install Terraform'
                  inputs:
                    terraformVersion: '$(terraformVersion)'

                - template: pipelines/templates/terraform-step.yml
                  parameters:
                    displayName: 'Terraform apply'
                    script: |
                      terraform apply -input=false -lock-timeout=300s "$(Pipeline.Workspace)/terraform-plan/tfplan"
