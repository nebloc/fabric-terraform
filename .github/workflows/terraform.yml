# Terraform CI/CD for the Fabric CI/CD lab (GitHub Actions edition).
#
# Mirrors azure-pipelines.yml: Validate -> Plan -> Apply. Authenticates to Azure
# (state backend storage account, ARM/azapi, Entra ID and Microsoft Fabric) with
# a single Entra ID service principal. Every value Terraform needs - backend
# config and all root-module input variables - is supplied via the workflow-level
# `env` block below and consumed by the ./.github/actions/terraform-step action.
#
# Secrets MUST live in GitHub Actions secrets. Non-secret values live in GitHub
# Actions variables (vars). Configure at least the following:
#
#   Secrets:   TENANT_ID, SUBSCRIPTION_ID, CLIENT_ID, CLIENT_SECRET,
#              ENTERPRISE_OBJECT_ID
#   Variables: BACKEND_RESOURCE_GROUP, BACKEND_STORAGE_ACCOUNT, BACKEND_CONTAINER,
#              BACKEND_KEY, RESOURCE_GROUP_NAME, CAPACITY_NAME, LOCATION,
#              FABRIC_TIER, WORKSPACE_NAME_PREFIX, CAPACITY_ADMINISTRATORS,
#              WORKSPACE_ADMINS
#
# The Apply job targets the `fabric` GitHub Environment - add required reviewers
# there to reproduce the Azure DevOps environment approval gate.

name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TERRAFORM_VERSION: '1.15.6'
  TF_IN_AUTOMATION: 'true'

  # --- Backend config ---
  BACKEND_RESOURCE_GROUP: ${{ vars.BACKEND_RESOURCE_GROUP }}
  BACKEND_STORAGE_ACCOUNT: ${{ vars.BACKEND_STORAGE_ACCOUNT }}
  BACKEND_CONTAINER: ${{ vars.BACKEND_CONTAINER }}
  BACKEND_KEY: ${{ vars.BACKEND_KEY }}

  # --- Service principal auth (backend storage + ARM/azapi) ---
  ARM_USE_AZUREAD: 'true'
  ARM_TENANT_ID: ${{ secrets.TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

  # --- Service principal auth (Microsoft Fabric) ---
  FABRIC_TENANT_ID: ${{ secrets.TENANT_ID }}
  FABRIC_CLIENT_ID: ${{ secrets.CLIENT_ID }}
  FABRIC_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

  # --- Terraform input variables ---
  TF_VAR_tenant_id: ${{ secrets.TENANT_ID }}
  TF_VAR_subscription_id: ${{ secrets.SUBSCRIPTION_ID }}
  TF_VAR_client_id: ${{ secrets.CLIENT_ID }}
  TF_VAR_client_secret: ${{ secrets.CLIENT_SECRET }}
  TF_VAR_enterprise_object_id: ${{ secrets.ENTERPRISE_OBJECT_ID }}
  TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
  TF_VAR_capacity_name: ${{ vars.CAPACITY_NAME }}
  TF_VAR_location: ${{ vars.LOCATION }}
  TF_VAR_fabric_tier: ${{ vars.FABRIC_TIER }}
  TF_VAR_workspace_name_prefix: ${{ vars.WORKSPACE_NAME_PREFIX }}
  TF_VAR_capacity_administrators: ${{ vars.CAPACITY_ADMINISTRATORS }}
  TF_VAR_workspace_admins: ${{ vars.WORKSPACE_ADMINS }}

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt and validate
        uses: ./.github/actions/terraform-step
        with:
          script: |
            terraform fmt -check -recursive
            terraform validate

  plan:
    name: Plan Terraform
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform plan
        uses: ./.github/actions/terraform-step
        with:
          script: |
            terraform plan -input=false -lock-timeout=300s -out=tfplan
            terraform show -no-color tfplan > tfplan.txt

      - name: Publish Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            tfplan
            tfplan.txt
          retention-days: 5

  apply:
    name: Apply Terraform
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: fabric
    steps:
      - uses: actions/checkout@v4

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform apply
        uses: ./.github/actions/terraform-step
        with:
          script: |
            terraform apply -input=false -lock-timeout=300s tfplan
