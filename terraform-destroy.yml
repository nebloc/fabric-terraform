# Manual destroy pipeline for the Fabric CI/CD lab.
#
# Triggers manually (`trigger: none`) and tears down everything the apply
# pipeline created. Uses the same Entra ID service principal and the shared
# pipelines/templates/terraform-step.yml so the ARM_* / TF_VAR_* env block is
# defined exactly once.
#
# Secrets must live in the `fabric-terraform` variable group:
#   tenantId, subscriptionId, clientId, clientSecret, enterpriseObjectId

trigger: none

pool:
  vmImage: ubuntu-latest

variables:
  # ---- Secrets + auth (service principal). Define these in the variable group. ----
  - group: spn-settings
  - group: backend-settings
  - group: terraform-settings

  # ---- Pipeline / tooling config ----
  - name: terraformVersion
    value: '1.15.6'
  - name: terraformWorkingDirectory
    value: '$(System.DefaultWorkingDirectory)'
  - name: environmentName
    value: 'fabric'


stages:
  - stage: Destroy
    displayName: 'Destroy Terraform'
    jobs:
      - job: Destroy
        displayName: 'Run terraform destroy'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: '$(terraformVersion)'

          - template: pipelines/templates/terraform-step.yml
            parameters:
              displayName: 'Terraform destroy'
              script: |
                terraform destroy -auto-approve -lock-timeout=300s